<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kaja og Lars Halvor</title>
    <style>
      :root {
        --petal-frost: #ffd6ff;
        --mauve: #e7c6ff;
        --mauve-2: #c8b6ff;
        --periwinkle: #b8c0ff;
        --periwinkle-2: #bbd0ff;

        --bg: #ffffff;
        --text: #222222;
        --text-secondary: #555555;
        --accent: #b8c0ff;
        --accent-hover: #9aa4f0;
        --border: #e5d9f0;
        --card-bg: #ffffff;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          sans-serif;
        background-color: var(--bg);
        color: var(--text);
        line-height: 1.7;
        font-size: 17px;
      }

      a {
        color: var(--accent);
        text-decoration: none;
        transition: color 0.2s ease;
      }

      a:hover {
        color: var(--accent-hover);
      }

      h1,
      h2,
      h3 {
        font-weight: 600;
        line-height: 1.2;
        color: var(--text);
      }

      h1 {
        font-size: 3.2rem;
        margin-bottom: 1rem;
      }

      h2 {
        font-size: 2.1rem;
        margin-bottom: 1.5rem;
      }

      h3 {
        font-size: 1.35rem;
        margin-bottom: 0.75rem;
      }

      p {
        margin-bottom: 1.25rem;
        color: var(--text-secondary);
      }

      .container {
        max-width: 1080px;
        margin: 0 auto;
        padding: 0 2rem;
      }

      header {
        position: sticky;
        top: 0;
        background-color: var(--bg);
        border-bottom: 1px solid var(--border);
        z-index: 100;
      }

      .nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1.25rem 0;
      }

      .logo {
        font-size: 1.35rem;
        font-weight: 700;
        color: var(--text);
        text-decoration: none;
      }

      nav ul {
        display: flex;
        gap: 2.25rem;
        list-style: none;
      }

      nav a {
        color: var(--text);
        font-weight: 500;
        font-size: 0.95rem;
        padding-bottom: 4px;
        border-bottom: 2px solid transparent;
        transition: all 0.2s ease;
      }

      nav a:hover,
      nav a.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }

      .menu-toggle {
        display: none;
        background: none;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        color: var(--text);
      }

      /* Soft pastel hero with gradient */
      .hero {
        padding: 7rem 0 6rem;
        text-align: left;
        background: linear-gradient(135deg, #ffd6ff 0%, #e7c6ff 100%);
        border-radius: 0 0 40px 40px;
        margin-bottom: 2rem;
      }

      .hero h1 {
        font-size: 4.2rem;
        max-width: 14ch;
        margin-bottom: 1.25rem;
      }

      .hero .subtitle {
        font-size: 1.35rem;
        color: #444;
        max-width: 28ch;
        margin-bottom: 2rem;
      }

      .cta-group {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
      }

      .btn {
        display: inline-block;
        padding: 0.85rem 1.75rem;
        font-size: 0.95rem;
        font-weight: 600;
        border-radius: 999px;
        transition: all 0.2s ease;
        text-decoration: none;
      }

      .btn-primary {
        background-color: #ffffff;
        color: #222;
        border: 1px solid #ddd;
        box-shadow: 0 2px 8px rgba(184, 192, 255, 0.3);
      }

      .btn-primary:hover {
        background-color: #f8f4ff;
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(184, 192, 255, 0.4);
      }

      .btn-secondary {
        background-color: transparent;
        color: #222;
        border: 1px solid rgba(255, 255, 255, 0.6);
      }

      .btn-secondary:hover {
        background-color: rgba(255, 255, 255, 0.3);
        border-color: rgba(255, 255, 255, 0.9);
      }

      .section {
        padding: 5rem 0;
      }

      .section-header {
        margin-bottom: 3rem;
      }

      .projects-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 2rem;
      }

      .project-card {
        border: 1px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
        background: var(--card-bg);
      }

      .project-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 15px 30px rgba(184, 192, 255, 0.2);
      }

      .project-image {
        width: 100%;
        height: 200px;
        background-size: cover;
        background-position: center;
        background-color: #f1e9ff;
      }

      .project-content {
        padding: 1.5rem;
      }

      .project-content h3 {
        margin-bottom: 0.4rem;
      }

      .project-meta {
        font-size: 0.85rem;
        color: var(--text-secondary);
        margin-bottom: 1rem;
      }

      .project-content p {
        font-size: 0.95rem;
        margin-bottom: 1.25rem;
      }

      .btn-small {
        padding: 0.5rem 1.1rem;
        font-size: 0.85rem;
      }

      footer {
        border-top: 1px solid var(--border);
        padding: 2.5rem 0;
        text-align: center;
        font-size: 0.875rem;
        color: var(--text-secondary);
      }

      @media (max-width: 768px) {
        .nav {
          flex-wrap: wrap;
        }
        nav ul {
          display: none;
          flex-direction: column;
          gap: 0;
          width: 100%;
          padding-top: 1rem;
          border-top: 1px solid var(--border);
          margin-top: 1rem;
        }
        nav ul.show {
          display: flex;
        }
        .menu-toggle {
          display: block;
        }
        .hero h1 {
          font-size: 2.85rem;
        }
        .projects-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <header>
      <div class="container">
        <div class="nav">
          <a href="#" class="logo">Header83</a>

          <button
            class="menu-toggle"
            aria-label="Toggle navigation"
            onclick="toggleMenu()"
          >
            ☰
          </button>

          <nav>
            <ul id="nav-menu">
              <li><a href="#" class="active">Save The Date</a></li>
              <li><a href="#">Invitasjon</a></li>
              <li><a href="#">Praktisk info</a></li>
              <li><a href="#">Ofte stilte spørsmål</a></li>
            </ul>
          </nav>
        </div>
      </div>
    </header>

    <!-- Hero with soft pastel gradient -->
    <section class="hero">
      <div class="container">
        <h1>Halvor Hansen</h1>
        <p class="subtitle">
          Product designer and frontend developer based in Oslo, Norway.
        </p>

        <div class="cta-group">
          <a href="#" class="btn btn-primary">See my work</a>
          <a href="#" class="btn btn-secondary">Get in touch</a>
        </div>
      </div>
    </section>

    <!-- Selected Work -->
    <section class="section" style="padding-top: 2rem; padding-bottom: 5rem">
      <div class="container">
        <div class="section-header">
          <h2>Overskrift</h2>
          <p>Blabla bla bla bla</p>
        </div>

        <!-- Project 1
        <div class="projects-grid">
          <div class="project-card">
            <div
              class="project-image"
              style="
                background-image: url(&quot;https://picsum.photos/id/1015/600/340&quot;);
              "
            ></div>
            <div class="project-content">
              <h3>Finora — Banking Dashboard</h3>
              <div class="project-meta">Product Design • 2025</div>
              <p>
                Redesigned the core dashboard experience for a Nordic fintech
                startup. Focused on clarity and speed.
              </p>
              <a href="#" class="btn btn-secondary btn-small">View project →</a>
            </div>
          </div>

          <!-- Project 2 -->
      </div>
    </section>

    <!-- Footer -->
    <footer>
      <div class="container">
        <p>Footer content</p>
      </div>
    </footer>

    <script>
      function toggleMenu() {
        const menu = document.getElementById("nav-menu");
        menu.classList.toggle("show");
      }
    </script>
  </body>
</html>
