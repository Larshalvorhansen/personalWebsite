<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stue-skjerm – Vertikal</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #000;
        color: #eee;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
      }
      .clock-container {
        position: relative;
        width: 380px;
        height: 380px;
        margin: 60px 0 40px 0;
      }
      .analog-clock {
        width: 100%;
        height: 100%;
      }
      .digital-time {
        position: absolute;
        top: 110%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 3.8rem;
        font-weight: 300;
        letter-spacing: 4px;
        color: #aaffff;
        text-shadow: 0 0 16px #00aaff88;
      }
      .section {
        width: 90%;
        max-width: 700px;
        margin: 20px 0;
      }
      h2 {
        font-size: 1.9rem;
        margin: 0.4em 0 0.6em;
        color: #88ddff;
        font-weight: 400;
      }
      .bus {
        font-size: 1.7rem;
        line-height: 1.5;
        margin: 0.4em 0;
        display: flex;
        align-items: center;
        gap: 1.2rem; /* avstand mellom kolonnene */
      }

      .bus .line {
        min-width: 3.5ch; /* nok plass til 2-3 sifre + bokstaver */
        font-weight: bold;
        color: #88ddff; /* litt mer synlig enn hvit */
        text-align: left;
      }

      .bus .dest {
        flex: 1; /* tar opp resten av plassen */
        color: #ddd;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .bus .time {
        min-width: 10ch; /* nok plass til "Ikke prøv engang" */
        text-align: right;
        color: #ffdd88;
        font-weight: 500;
      }

      /* Valgfritt: gjør spesialmeldinger mer iøynefallende */
      .bus .time.special {
        color: #ff7777;
        font-weight: bold;
        text-transform: uppercase;
      }
      .time {
        color: #ffdd88;
        font-weight: 500;
        min-width: 4.2ch;
        display: inline-block;
      }
      .dest {
        color: #ccc;
      }
      #quote {
        margin-top: 60px;
        font-size: 1.9rem;
        font-style: italic;
        color: #aaa;
        text-align: center;
        max-width: 85%;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div class="clock-container">
      <svg class="analog-clock" viewBox="0 0 200 200">
        <circle
          cx="100"
          cy="100"
          r="98"
          fill="none"
          stroke="#000"
          stroke-width="4"
        />
        <circle cx="100" cy="100" r="4" fill="#88ddff" />
        <g stroke="#999" stroke-width="3">
          <line
            x1="100"
            y1="10"
            x2="100"
            y2="22"
            transform="rotate(0 100 100)"
          />
          <line
            x1="100"
            y1="10"
            x2="100"
            y2="22"
            transform="rotate(30 100 100)"
          />
          <line
            x1="100"
            y1="10"
            x2="100"
            y2="22"
            transform="rotate(60 100 100)"
          />
          <line
            x1="100"
            y1="10"
            x2="100"
            y2="22"
            transform="rotate(90 100 100)"
          />
          <line
            x1="100"
            y1="10"
            x2="100"
            y2="22"
            transform="rotate(120 100 100)"
          />
          <line
            x1="100"
            y1="10"
            x2="100"
            y2="22"
            transform="rotate(150 100 100)"
          />
          <line
            x1="100"
            y1="10"
            x2="100"
            y2="22"
            transform="rotate(180 100 100)"
          />
          <line
            x1="100"
            y1="10"
            x2="100"
            y2="22"
            transform="rotate(210 100 100)"
          />
          <line
            x1="100"
            y1="10"
            x2="100"
            y2="22"
            transform="rotate(240 100 100)"
          />
          <line
            x1="100"
            y1="10"
            x2="100"
            y2="22"
            transform="rotate(270 100 100)"
          />
          <line
            x1="100"
            y1="10"
            x2="100"
            y2="22"
            transform="rotate(300 100 100)"
          />
          <line
            x1="100"
            y1="10"
            x2="100"
            y2="22"
            transform="rotate(330 100 100)"
          />
        </g>
        <g id="hands">
          <line
            id="hour"
            x1="100"
            y1="100"
            x2="100"
            y2="60"
            stroke="#ffffff"
            stroke-width="6"
            stroke-linecap="round"
          />
          <line
            id="minute"
            x1="100"
            y1="100"
            x2="100"
            y2="35"
            stroke="#ffffff"
            stroke-width="6"
            stroke-linecap="round"
          />
          <line
            id="second"
            x1="100"
            y1="100"
            x2="100"
            y2="25"
            stroke="#ffffff"
            stroke-width="3"
            stroke-linecap="round"
          />
        </g>
      </svg>
      <div class="digital-time" id="digital">00:00:00</div>
    </div>

    <div class="section">
      <h2>Jakob kirke 🚌</h2>
      <div id="jakob-bus"></div>
    </div>
    <div class="section">
      <h2>Nybrua 🚊</h2>
      <div id="nybrua-trikk"></div>
    </div>

    <div class="quote-section">
      <h2>Dagens quote</h2>
      <div
        id="quote"
        style="
          font-style: italic;
          color: #aaa;
          text-align: center;
          max-width: 100%;
          line-height: 1.4;
        "
      ></div>
    </div>

    <script>
      // Klokke
      function updateClock() {
        const now = new Date();
        const h = now.getHours(),
          m = now.getMinutes(),
          s = now.getSeconds();
        document
          .getElementById("hour")
          .setAttribute(
            "transform",
            `rotate(${(h % 12) * 30 + m * 0.5} 100 100)`,
          );
        document
          .getElementById("minute")
          .setAttribute("transform", `rotate(${m * 6 + s * 0.1} 100 100)`);
        document
          .getElementById("second")
          .setAttribute("transform", `rotate(${s * 6} 100 100)`);
        document.getElementById("digital").textContent = now.toLocaleTimeString(
          "no-NO",
          { hour: "2-digit", minute: "2-digit", second: "2-digit" },
        );
      }
      setInterval(updateClock, 1000);
      updateClock();

      // ────────────────────────────────────────────────
      // Entur API – nå med 100 % fungerende query (offisiell struktur)
      // ────────────────────────────────────────────────
      const API_URL = "https://api.entur.io/journey-planner/v3/graphql";

      const JAKOB_KIRKE_ID = "NSR:StopPlace:6435";
      const NYBRUA_ID = "NSR:StopPlace:61989";
      const JERNBANETORGET_ID = "NSR:StopPlace:58366";
      const NATIONALTHEATRET_ID = "NSR:StopPlace:58404"; // bytt hvis du finner bedre ID

      const query = `
{
  stopPlace(id: "STOP_ID") {
    estimatedCalls(numberOfDepartures: 8, timeRange: 3600) {
      expectedDepartureTime
      destinationDisplay { frontText }
      serviceJourney {
        journeyPattern {
          line { publicCode }
        }
      }
    }
  }
}`;

      async function fetchDepartures(stopId, elementId, title) {
        const statusEl = document.getElementById(elementId);
        statusEl.innerHTML = `<p style="color:#888">Laster ${title} (${stopId})...</p>`;

        try {
          const q = query.replace("STOP_ID", stopId);
          const res = await fetch(API_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "ET-Client-Name": "stue-skjerm-v2",
            },
            body: JSON.stringify({ query: q }),
          });

          const json = await res.json();

          if (json.errors) {
            statusEl.innerHTML = `<p style="color:#f55">GraphQL-feil</p>`;
            return;
          }

          const calls = json.data?.stopPlace?.estimatedCalls || [];

          let html = "";
          for (let call of calls) {
            if (!call.expectedDepartureTime) continue;

            const time = new Date(call.expectedDepartureTime);
            const diffMin = Math.round((time - new Date()) / 60000);

            let timestr;
            let isSpecial = false;

            if (diffMin <= 0) {
              timestr = "nå...";
            } else if (diffMin === 1) {
              timestr = "Ikke prøv deg &emsp; 1 min";
              isSpecial = false;
            } else if (diffMin === 2) {
              timestr = "Løp! &emsp; 2 min";
              isSpecial = true;
            } else if (diffMin === 3) {
              timestr = "Goood tid &emsp; 3 min";
              isSpecial = false;
            } else if (diffMin < 60) {
              timestr = `${diffMin} min`;
            } else {
              timestr = time.toLocaleTimeString("no-NO", {
                hour: "2-digit",
                minute: "2-digit",
              });
            }

            const line =
              call.serviceJourney?.journeyPattern?.line?.publicCode || "–";
            const dest = call.destinationDisplay?.frontText || "Ukjent";

            html += `
    <div class="bus">
      <span class="line">${line}</span>
      <span class="dest">${dest}</span>
      <span class="time${isSpecial ? " special" : ""}">${timestr}</span>
    </div>`;
          }

          statusEl.innerHTML =
            html || `<p style="opacity:0.6">Ingen avganger neste time</p>`;
        } catch (err) {
          statusEl.innerHTML = `<p style="color:#f55">Feil</p>`;
        }
      }

      // Last inn alle
      fetchDepartures(JAKOB_KIRKE_ID, "jakob-bus", "Jakob kirke");
      fetchDepartures(NYBRUA_ID, "nybrua-trikk", "Nybrua");
      fetchDepartures(JERNBANETORGET_ID, "jernbanetorget", "Jernbanetorget");
      fetchDepartures(
        NATIONALTHEATRET_ID,
        "nationaltheatret",
        "Nationaltheatret",
      );

      // Oppdater hvert 10. sekund
      setInterval(() => {
        fetchDepartures(JAKOB_KIRKE_ID, "jakob-bus", "Jakob kirke");
        fetchDepartures(NYBRUA_ID, "nybrua-trikk", "Nybrua");
        fetchDepartures(JERNBANETORGET_ID, "jernbanetorget", "Jernbanetorget");
        fetchDepartures(
          NATIONALTHEATRET_ID,
          "nationaltheatret",
          "Nationaltheatret",
        );
      }, 10000);

      async function dagensQuote() {
        try {
          const res = await fetch("quotes.txt");
          const text = await res.text();
          const lines = text.split("\n").filter((line) => line.trim() !== "");

          if (lines.length === 0) return;

          // Enkel hash av dagens dato → samme index hele dagen
          const today = new Date().toDateString();
          let seed = 0;
          for (let char of today) seed += char.charCodeAt(0);
          const index = seed % lines.length;

          document.getElementById("quote").textContent = lines[index].trim();
        } catch {
          document.getElementById("quote").textContent = "–";
        }
      }

      dagensQuote();
    </script>
  </body>
</html>
