<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Full Screen Rotated Test Pattern</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #000;
        overflow: hidden;
      }

      img {
        /* The Secret Sauce: Use the opposite viewport units */
        /* This ensures the image 'fills' the space after the rotation */
        width: 100vh;
        height: 100vw;

        object-fit: cover; /* This ensures the painting fills the screen entirely */
        transform: rotate(-90deg);
        transform-origin: center;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <img src="test-pattern.png" alt="Test Pattern" />
  </body>
</html>
