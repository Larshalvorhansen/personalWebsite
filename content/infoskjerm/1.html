<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stue-skjerm – Vertikal (rotert & upper right)</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        background: #000;
        color: #eee;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      body {
        display: flex;
        /* Move content to upper right after rotation */
        align-items: flex-start; /* top */
        justify-content: flex-end; /* right */

        /* Rotate 90° counter-clockwise */
        transform: rotate(-90deg);
        transform-origin: center center;

        /* Swapped dimensions because of rotation */
        width: 100vh;
        height: 100vw;
      }

      .main-content {
        /* Add some margin from the edges so it doesn't touch the border */
        margin-top: 490px; /* distance from top (after rotation) */
        margin-left: 490px; /* distance from right edge (after rotation) */

        width: 780px; /* fixed comfortable width */
        max-width: 92vw; /* safety on very small screens */
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-bottom: 40px;
        box-sizing: border-box;
      }

      .clock-container {
        position: relative;
        width: 380px;
        height: 380px;
        margin: 20px 0 35px 0;
      }

      .analog-clock {
        width: 100%;
        height: 100%;
      }

      .digital-time {
        position: absolute;
        top: 110%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 3.8rem;
        font-weight: 300;
        letter-spacing: 4px;
        color: #aaffff;
        text-shadow: 0 0 16px #00aaff88;
      }

      .section,
      .quote-section {
        width: 92%;
        max-width: 700px;
        margin: 18px 0;
      }

      h2 {
        font-size: 1.95rem;
        margin: 0.4em 0 0.6em;
        color: #88ddff;
        font-weight: 400;
      }

      .bus {
        font-size: 1.72rem;
        line-height: 1.55;
        margin: 0.45em 0;
        display: flex;
        align-items: center;
        gap: 1.3rem;
      }

      .bus .line {
        min-width: 3.8ch;
        font-weight: bold;
        color: #88ddff;
      }

      .bus .dest {
        flex: 1;
        color: #ddd;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .bus .time {
        min-width: 11ch;
        text-align: right;
        color: #ffdd88;
        font-weight: 500;
      }

      .bus .time.special {
        color: #ff7777;
        font-weight: bold;
        text-transform: uppercase;
      }

      #quote {
        font-size: 1.9rem;
        font-style: italic;
        color: #aaa;
        text-align: center;
        line-height: 1.45;
      }

      /* Optional: shrink a bit on very small heights */
      @media (max-height: 720px) {
        .main-content {
          margin-top: 215px;
          margin-left: 215px;
        }
        .clock-container {
          width: 340px;
          height: 340px;
          margin: 15px 0 25px 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="main-content">
      <div class="clock-container">
        <svg class="analog-clock" viewBox="0 0 200 200">
          <circle
            cx="100"
            cy="100"
            r="98"
            fill="none"
            stroke="#000"
            stroke-width="4"
          />
          <circle cx="100" cy="100" r="4" fill="#88ddff" />
          <g stroke="#999" stroke-width="3">
            <line
              x1="100"
              y1="10"
              x2="100"
              y2="22"
              transform="rotate(0 100 100)"
            />
            <line
              x1="100"
              y1="10"
              x2="100"
              y2="22"
              transform="rotate(30 100 100)"
            />
            <line
              x1="100"
              y1="10"
              x2="100"
              y2="22"
              transform="rotate(60 100 100)"
            />
            <line
              x1="100"
              y1="10"
              x2="100"
              y2="22"
              transform="rotate(90 100 100)"
            />
            <line
              x1="100"
              y1="10"
              x2="100"
              y2="22"
              transform="rotate(120 100 100)"
            />
            <line
              x1="100"
              y1="10"
              x2="100"
              y2="22"
              transform="rotate(150 100 100)"
            />
            <line
              x1="100"
              y1="10"
              x2="100"
              y2="22"
              transform="rotate(180 100 100)"
            />
            <line
              x1="100"
              y1="10"
              x2="100"
              y2="22"
              transform="rotate(210 100 100)"
            />
            <line
              x1="100"
              y1="10"
              x2="100"
              y2="22"
              transform="rotate(240 100 100)"
            />
            <line
              x1="100"
              y1="10"
              x2="100"
              y2="22"
              transform="rotate(270 100 100)"
            />
            <line
              x1="100"
              y1="10"
              x2="100"
              y2="22"
              transform="rotate(300 100 100)"
            />
            <line
              x1="100"
              y1="10"
              x2="100"
              y2="22"
              transform="rotate(330 100 100)"
            />
          </g>
          <g id="hands">
            <line
              id="hour"
              x1="100"
              y1="100"
              x2="100"
              y2="60"
              stroke="#ffffff"
              stroke-width="6"
              stroke-linecap="round"
            />
            <line
              id="minute"
              x1="100"
              y1="100"
              x2="100"
              y2="35"
              stroke="#ffffff"
              stroke-width="6"
              stroke-linecap="round"
            />
            <line
              id="second"
              x1="100"
              y1="100"
              x2="100"
              y2="25"
              stroke="#ffffff"
              stroke-width="3"
              stroke-linecap="round"
            />
          </g>
        </svg>
        <div class="digital-time" id="digital">00:00:00</div>
      </div>

      <div class="section">
        <h2>Buss fra Jakob kirke</h2>
        <div id="jakob-bus"></div>
      </div>

      <div class="section">
        <h2>Trikk fra Nybrua</h2>
        <div id="nybrua-trikk"></div>
      </div>

      <div class="quote-section">
        <h2>Dagens quote</h2>
        <div id="quote"></div>
      </div>
    </div>

    <script>
      // Clock
      function updateClock() {
        const now = new Date();
        const h = now.getHours(),
          m = now.getMinutes(),
          s = now.getSeconds();

        document
          .getElementById("hour")
          .setAttribute(
            "transform",
            `rotate(${(h % 12) * 30 + m * 0.5} 100 100)`,
          );
        document
          .getElementById("minute")
          .setAttribute("transform", `rotate(${m * 6 + s * 0.1} 100 100)`);
        document
          .getElementById("second")
          .setAttribute("transform", `rotate(${s * 6} 100 100)`);

        document.getElementById("digital").textContent = now.toLocaleTimeString(
          "no-NO",
          {
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
          },
        );
      }
      setInterval(updateClock, 1000);
      updateClock();

      // Entur departures
      const API_URL = "https://api.entur.io/journey-planner/v3/graphql";
      const JAKOB_KIRKE_ID = "NSR:StopPlace:6435";
      const NYBRUA_ID = "NSR:StopPlace:61989";

      const query = `{
        stopPlace(id: "STOP_ID") {
          estimatedCalls(numberOfDepartures: 8, timeRange: 3600) {
            expectedDepartureTime
            destinationDisplay { frontText }
            serviceJourney { journeyPattern { line { publicCode } } }
          }
        }
      }`;

      async function fetchDepartures(stopId, elementId, title) {
        const el = document.getElementById(elementId);
        el.innerHTML = `<p style="color:#888">Laster ${title}...</p>`;
        try {
          const res = await fetch(API_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "ET-Client-Name": "stue-skjerm-v2",
            },
            body: JSON.stringify({ query: query.replace("STOP_ID", stopId) }),
          });
          const json = await res.json();
          const calls = json.data?.stopPlace?.estimatedCalls || [];
          let html = "";
          for (let call of calls) {
            if (!call.expectedDepartureTime) continue;
            const time = new Date(call.expectedDepartureTime);
            const diffMin = Math.round((time - new Date()) / 60000);
            let timestr =
              diffMin <= 0
                ? "nå..."
                : diffMin === 1
                  ? "Ikke prøv deg &emsp; 1 min"
                  : diffMin === 2
                    ? "Løp! &emsp; 2 min"
                    : diffMin === 3
                      ? "Goood tid &emsp; 3 min"
                      : diffMin < 60
                        ? `${diffMin} min`
                        : time.toLocaleTimeString("no-NO", {
                            hour: "2-digit",
                            minute: "2-digit",
                          });

            const line =
              call.serviceJourney?.journeyPattern?.line?.publicCode || "–";
            const dest = call.destinationDisplay?.frontText || "Ukjent";

            html += `<div class="bus"><span class="line">${line}</span><span class="dest">${dest}</span><span class="time${diffMin === 2 ? " special" : ""}">${timestr}</span></div>`;
          }
          el.innerHTML =
            html || `<p style="opacity:0.6">Ingen avganger neste time</p>`;
        } catch (e) {
          el.innerHTML = `<p style="color:#f55">Feil ved lasting</p>`;
        }
      }

      fetchDepartures(JAKOB_KIRKE_ID, "jakob-bus", "Jakob kirke");
      fetchDepartures(NYBRUA_ID, "nybrua-trikk", "Nybrua");

      setInterval(() => {
        fetchDepartures(JAKOB_KIRKE_ID, "jakob-bus", "Jakob kirke");
        fetchDepartures(NYBRUA_ID, "nybrua-trikk", "Nybrua");
      }, 10000);
    </script>
    <!-- Dagens quote container -->
    <div id="quote-container">
      <p id="quote-text">Bedre med en iskaffe i hånden en ti bak disken.</p>
      <p id="quote-author" style="font-size: 0.8em; opacity: 0.7"></p>
    </div>
  </body>
</html>
