<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stue-skjerm – Vertikal (rotert & upper right) [DEBUG GRID]</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        background: #000000;
        color: #eee;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      body {
        transform: rotate(-90deg);
        transform-origin: center center;
        width: 100vh;
        height: 100vw;
      }

      :root {
        --margin-top: 280px; /* ← økt for å fikse topp-kutting */
        --margin-left: 10px;
      }

      .main-content {
        width: 102%;
        height: 100%;
        margin-top: var(--margin-top);
        margin-left: calc(
          var(--margin-left) + 25px
        ); /* ← redusert for å fikse venstre-kutting */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2px 2px;
        box-sizing: border-box;
        gap: 18px;
      }

      .clock-container {
        position: relative;
        width: 380px;
        height: 380px;
      }

      .analog-clock {
        width: 100%;
        height: 100%;
      }

      .digital-time {
        font-size: 3.8rem;
        font-weight: 300;
        letter-spacing: 4px;
        color: #aaffff;
        text-shadow: 0 0 16px #00aaff88;
        text-align: center;
        margin-top: -28px;
      }

      .section,
      .quote-section {
        width: 95%;
        max-width: 780px;
      }

      h2 {
        font-size: 1.95rem;
        margin: 0.4em 0 0.6em;
        color: #88ddff;
        font-weight: 400;
      }

      .bus {
        font-size: 1.72rem;
        line-height: 1.55;
        display: flex;
        align-items: center;
        gap: 1.3rem;
        padding: 8px 12px;
      }

      .bus .line {
        min-width: 3.8ch;
        font-weight: bold;
        color: #88ddff;
      }

      .bus .dest {
        flex: 1;
        color: #ddd;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .bus .time {
        min-width: 11ch;
        text-align: right;
        color: #ffdd88;
        font-weight: 500;
      }

      .bus .time.special {
        color: #ff7777;
        font-weight: bold;
        text-transform: uppercase;
      }

      #quote {
        font-size: 1.85rem;
        font-style: italic;
        color: #ccc;
        text-align: center;
        line-height: 1.45;
      }

      /* ==================== DEBUG GRID ==================== */
      #debug-grid {
        position: fixed;
        inset: 0;
        z-index: 9999;
        pointer-events: none;
        opacity: 0.25;
      }
    </style>
  </head>
  <body class="debug">
    <div class="main-content">
      <div class="clock-container">
        <svg class="analog-clock" viewBox="0 0 200 200">
          <circle
            cx="100"
            cy="100"
            r="98"
            fill="none"
            stroke="#000"
            stroke-width="4"
          />
          <circle cx="100" cy="100" r="4" fill="#88ddff" />
          <g stroke="#999" stroke-width="3">
            <line
              x1="100"
              y1="10"
              x2="100"
              y2="22"
              transform="rotate(0 100 100)"
            />
            <line
              x1="100"
              y1="10"
              x2="100"
              y2="22"
              transform="rotate(30 100 100)"
            />
            <line
              x1="100"
              y1="10"
              x2="100"
              y2="22"
              transform="rotate(60 100 100)"
            />
            <line
              x1="100"
              y1="10"
              x2="100"
              y2="22"
              transform="rotate(90 100 100)"
            />
            <line
              x1="100"
              y1="10"
              x2="100"
              y2="22"
              transform="rotate(120 100 100)"
            />
            <line
              x1="100"
              y1="10"
              x2="100"
              y2="22"
              transform="rotate(150 100 100)"
            />
            <line
              x1="100"
              y1="10"
              x2="100"
              y2="22"
              transform="rotate(180 100 100)"
            />
            <line
              x1="100"
              y1="10"
              x2="100"
              y2="22"
              transform="rotate(210 100 100)"
            />
            <line
              x1="100"
              y1="10"
              x2="100"
              y2="22"
              transform="rotate(240 100 100)"
            />
            <line
              x1="100"
              y1="10"
              x2="100"
              y2="22"
              transform="rotate(270 100 100)"
            />
            <line
              x1="100"
              y1="10"
              x2="100"
              y2="22"
              transform="rotate(300 100 100)"
            />
            <line
              x1="100"
              y1="10"
              x2="100"
              y2="22"
              transform="rotate(330 100 100)"
            />
          </g>
          <g id="hands">
            <line
              id="hour"
              x1="100"
              y1="100"
              x2="100"
              y2="60"
              stroke="#ffffff"
              stroke-width="6"
              stroke-linecap="round"
            />
            <line
              id="minute"
              x1="100"
              y1="100"
              x2="100"
              y2="35"
              stroke="#ffffff"
              stroke-width="6"
              stroke-linecap="round"
            />
            <line
              id="second"
              x1="100"
              y1="100"
              x2="100"
              y2="25"
              stroke="#ffffff"
              stroke-width="3"
              stroke-linecap="round"
            />
          </g>
        </svg>
      </div>

      <div class="digital-time" id="digital">00:00:00</div>

      <div class="quote-section">
        <h2>Ukens quote</h2>
        <div id="quote">Bedre med en iskaffe i hånden enn ti bak disken.</div>
      </div>
      <div class="section">
        <h2>Buss fra Jakob kirke</h2>
        <div id="jakob-bus"></div>
      </div>
      <div class="section">
        <h2>Trikk fra Nybrua</h2>
        <div id="nybrua-trikk"></div>
      </div>
    </div>

    <!-- DEBUG GRID -->
    <canvas id="debug-grid"></canvas>

    <script>
      function updateClock() {
        const now = new Date();
        const h = now.getHours(),
          m = now.getMinutes(),
          s = now.getSeconds();

        document
          .getElementById("hour")
          .setAttribute(
            "transform",
            `rotate(${(h % 12) * 30 + m * 0.5} 100 100)`,
          );
        document
          .getElementById("minute")
          .setAttribute("transform", `rotate(${m * 6 + s * 0.1} 100 100)`);
        document
          .getElementById("second")
          .setAttribute("transform", `rotate(${s * 6} 100 100)`);

        document.getElementById("digital").textContent = now.toLocaleTimeString(
          "no-NO",
          {
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
          },
        );
      }
      setInterval(updateClock, 1000);
      updateClock();

      const API_URL = "https://api.entur.io/journey-planner/v3/graphql";
      const JAKOB_KIRKE_ID = "NSR:StopPlace:6435";
      const NYBRUA_ID = "NSR:StopPlace:61989";
      const query = `{ stopPlace(id: "STOP_ID") { estimatedCalls(numberOfDepartures: 8, timeRange: 3600) { expectedDepartureTime destinationDisplay { frontText } serviceJourney { journeyPattern { line { publicCode } } } } } }`;

      async function fetchDepartures(stopId, elementId, title) {
        const el = document.getElementById(elementId);
        el.innerHTML = `<p style="color:#888">Laster ${title}...</p>`;
        try {
          const res = await fetch(API_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "ET-Client-Name": "stue-skjerm-v2",
            },
            body: JSON.stringify({ query: query.replace("STOP_ID", stopId) }),
          });
          const json = await res.json();
          const calls = json.data?.stopPlace?.estimatedCalls || [];
          let html = "";
          for (let call of calls) {
            if (!call.expectedDepartureTime) continue;
            const time = new Date(call.expectedDepartureTime);
            const diffMin = Math.round((time - new Date()) / 60000);
            let timestr =
              diffMin <= 0
                ? "nå..."
                : diffMin === 1
                  ? "Ikke prøv deg &emsp; 1 min"
                  : diffMin === 2
                    ? "Løp! &emsp; 2 min"
                    : diffMin === 3
                      ? "Goood tid &emsp; 3 min"
                      : diffMin < 60
                        ? `${diffMin} min`
                        : time.toLocaleTimeString("no-NO", {
                            hour: "2-digit",
                            minute: "2-digit",
                          });
            const line =
              call.serviceJourney?.journeyPattern?.line?.publicCode || "–";
            const dest = call.destinationDisplay?.frontText || "Ukjent";
            html += `<div class="bus"><span class="line">${line}</span><span class="dest">${dest}</span><span class="time${diffMin === 2 ? " special" : ""}">${timestr}</span></div>`;
          }
          el.innerHTML =
            html || `<p style="opacity:0.6">Ingen avganger neste time</p>`;
        } catch (e) {
          el.innerHTML = `<p style="color:#f55">Feil ved lasting</p>`;
        }
      }

      fetchDepartures(JAKOB_KIRKE_ID, "jakob-bus", "Jakob kirke");
      fetchDepartures(NYBRUA_ID, "nybrua-trikk", "Nybrua");
      setInterval(() => {
        fetchDepartures(JAKOB_KIRKE_ID, "jakob-bus", "Jakob kirke");
        fetchDepartures(NYBRUA_ID, "nybrua-trikk", "Nybrua");
      }, 10000);

      // DEBUG GRID
      const canvas = document.getElementById("debug-grid");
      function drawDebugGrid() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "rgba(0, 255, 255, 0.4)";
        ctx.fillStyle = "#0ff";
        ctx.font = "bold 13px monospace";
        ctx.lineWidth = 1;

        for (let x = 0; x < canvas.width; x += 40) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, canvas.height);
          ctx.stroke();
          ctx.fillText(x.toString().padStart(4, "0"), x + 3, 18);
        }
        for (let y = 0; y < canvas.height; y += 40) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(canvas.width, y);
          ctx.stroke();
          ctx.fillText(y.toString().padStart(4, "0"), 6, y + 15);
        }

        ctx.font = "bold 28px monospace";
        ctx.globalAlpha = 0.6;
        for (let x = 0; x < canvas.width; x += 200) {
          for (let y = 0; y < canvas.height; y += 200) {
            ctx.fillText(x + "," + y, x + 8, y + 35);
          }
        }
        ctx.globalAlpha = 1;
      }
      window.addEventListener("resize", drawDebugGrid);
      drawDebugGrid();
    </script>
  </body>
</html>
