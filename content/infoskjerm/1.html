<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Centered Test Pattern</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .container {
        transform: rotate(-90deg);
        max-width: 100%;
        max-height: 100%;
      }

      img {
        width: 100%;
        height: auto;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img src="test.png" alt="Test Pattern" />
    </div>
  </body>
</html>
