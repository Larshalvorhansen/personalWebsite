<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stue-skjerm – Vertikal</title>
    <style>
      /* 1. LOCK THE VIEWPORT */
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        background: #000;
        color: #eee;
        overflow: hidden;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      /* 2. PIXEL-PERFECT ROTATION */
      body {
        position: absolute;
        width: 100vh;
        height: 100vw;
        left: 0;
        top: 100vh;
        transform: rotate(-90deg);
        transform-origin: 0 0;
      }

      .main-content {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
      }

      /* 3. THE PAINTING */
      .painting-container {
        width: 100%;
        height: 35%; /* Adjust this percentage to give more/less room to text */
        flex-shrink: 0;
        background: #000;
      }

      .painting-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      /* 4. DASHBOARD ELEMENTS */
      .clock-container {
        width: 600px;
        height: 600px;
        margin-top: 15px;
        text-align: center;
      }

      .analog-clock {
        width: 100%;
        height: 100%;
      }

      .digital-time {
        font-size: 5rem;
        color: #aaffff;
        text-shadow: 0 0 15px #00aaff88;
        margin-top: -10px;
      }

      .quote-section,
      .section {
        width: 92%;
        margin-top: 15px;
      }

      h2 {
        font-size: 3rem;
        color: #88ddff;
        margin: 5px 0;
        font-weight: 400;
        border-bottom: 1px solid #222;
      }

      #quote {
        font-size: 2rem;
        font-style: italic;
        color: #ccc;
        text-align: center;
      }

      .bus {
        display: flex;
        font-size: 2rem;
        padding: 6px 0;
        border-bottom: 1px solid #111;
        align-items: center;
      }
      .line {
        font-weight: bold;
        color: #88ddff;
        width: 55px;
      }
      .dest {
        flex: 1;
        color: #ddd;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .time {
        color: #ffdd88;
        width: 180px;
        text-align: right;
      }
      .special {
        color: #ff7777;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="main-content">
      <div class="clock-container">
        <svg class="analog-clock" viewBox="0 0 200 200">
          <circle
            cx="100"
            cy="100"
            r="98"
            fill="none"
            stroke="#333"
            stroke-width="2"
          />
          <g stroke="#555" stroke-width="3">
            <line
              x1="100"
              y1="10"
              x2="100"
              y2="22"
              transform="rotate(0 100 100)"
            />
            <line
              x1="100"
              y1="10"
              x2="100"
              y2="22"
              transform="rotate(30 100 100)"
            />
            <line
              x1="100"
              y1="10"
              x2="100"
              y2="22"
              transform="rotate(60 100 100)"
            />
            <line
              x1="100"
              y1="10"
              x2="100"
              y2="22"
              transform="rotate(90 100 100)"
            />
            <line
              x1="100"
              y1="10"
              x2="100"
              y2="22"
              transform="rotate(120 100 100)"
            />
            <line
              x1="100"
              y1="10"
              x2="100"
              y2="22"
              transform="rotate(150 100 100)"
            />
            <line
              x1="100"
              y1="10"
              x2="100"
              y2="22"
              transform="rotate(180 100 100)"
            />
            <line
              x1="100"
              y1="10"
              x2="100"
              y2="22"
              transform="rotate(210 100 100)"
            />
            <line
              x1="100"
              y1="10"
              x2="100"
              y2="22"
              transform="rotate(240 100 100)"
            />
            <line
              x1="100"
              y1="10"
              x2="100"
              y2="22"
              transform="rotate(270 100 100)"
            />
            <line
              x1="100"
              y1="10"
              x2="100"
              y2="22"
              transform="rotate(300 100 100)"
            />
            <line
              x1="100"
              y1="10"
              x2="100"
              y2="22"
              transform="rotate(330 100 100)"
            />
          </g>
          <g id="hands">
            <line
              id="hour"
              x1="100"
              y1="100"
              x2="100"
              y2="60"
              stroke="#fff"
              stroke-width="6"
              stroke-linecap="round"
            />
            <line
              id="minute"
              x1="100"
              y1="100"
              x2="100"
              y2="35"
              stroke="#fff"
              stroke-width="6"
              stroke-linecap="round"
            />
            <line
              id="second"
              x1="100"
              y1="100"
              x2="100"
              y2="25"
              stroke="#ff5555"
              stroke-width="2"
              stroke-linecap="round"
            />
          </g>
          <circle cx="100" cy="100" r="4" fill="#88ddff" />
        </svg>
        <div class="digital-time" id="digital">00:00:00</div>
      </div>

      <div class="quote-section">
        <h2>Ukens quote</h2>
        <div id="quote">Bedre med en iskaffe i hånden enn ti bak disken.</div>
      </div>

      <div class="section">
        <h2>Buss fra Jakob kirke</h2>
        <div id="jakob-bus"></div>
      </div>
      <div class="section">
        <h2>Trikk fra Nybrua</h2>
        <div id="nybrua-trikk"></div>
      </div>
    </div>

    <script>
      function updateClock() {
        const now = new Date();
        const h = now.getHours(),
          m = now.getMinutes(),
          s = now.getSeconds();
        document
          .getElementById("hour")
          .setAttribute(
            "transform",
            `rotate(${(h % 12) * 30 + m * 0.5} 100 100)`,
          );
        document
          .getElementById("minute")
          .setAttribute("transform", `rotate(${m * 6 + s * 0.1} 100 100)`);
        document
          .getElementById("second")
          .setAttribute("transform", `rotate(${s * 6} 100 100)`);
        document.getElementById("digital").textContent = now.toLocaleTimeString(
          "no-NO",
          { hour: "2-digit", minute: "2-digit", second: "2-digit" },
        );
      }
      setInterval(updateClock, 1000);
      updateClock();

      const API_URL = "https://api.entur.io/journey-planner/v3/graphql";
      const JAKOB_KIRKE_ID = "NSR:StopPlace:6435";
      const NYBRUA_ID = "NSR:StopPlace:61989";
      const query = `{ stopPlace(id: "STOP_ID") { estimatedCalls(numberOfDepartures: 4, timeRange: 3600) { expectedDepartureTime destinationDisplay { frontText } serviceJourney { journeyPattern { line { publicCode } } } } } }`;

      async function fetchDepartures(stopId, elementId, title) {
        const el = document.getElementById(elementId);
        try {
          const res = await fetch(API_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "ET-Client-Name": "stue-skjerm-v2",
            },
            body: JSON.stringify({ query: query.replace("STOP_ID", stopId) }),
          });
          const json = await res.json();
          const calls = json.data?.stopPlace?.estimatedCalls || [];
          let html = "";

          for (let call of calls) {
            const time = new Date(call.expectedDepartureTime);
            const diffMin = Math.round((time - new Date()) / 60000);
            let timestr =
              diffMin <= 0
                ? "nå..."
                : diffMin === 1
                  ? "Ikke prøv deg &emsp; 1 min"
                  : diffMin === 2
                    ? "Løp! &emsp; 2 min"
                    : diffMin === 3
                      ? "Goood tid &emsp; 3 min"
                      : diffMin < 60
                        ? `${diffMin} min`
                        : time.toLocaleTimeString("no-NO", {
                            hour: "2-digit",
                            minute: "2-digit",
                          });

            const line =
              call.serviceJourney?.journeyPattern?.line?.publicCode || "–";
            const dest = call.destinationDisplay?.frontText || "Ukjent";
            html += `<div class="bus"><span class="line">${line}</span><span class="dest">${dest}</span><span class="time${diffMin === 2 ? " special" : ""}">${timestr}</span></div>`;
          }
          el.innerHTML = html || `<p style="opacity:0.6">Ingen avganger</p>`;
        } catch (e) {
          el.innerHTML = `<p style="color:#f55">Feil ved lasting</p>`;
        }
      }

      const refreshAll = () => {
        fetchDepartures(JAKOB_KIRKE_ID, "jakob-bus", "Jakob kirke");
        fetchDepartures(NYBRUA_ID, "nybrua-trikk", "Nybrua");
      };

      refreshAll();
      setInterval(refreshAll, 15000);
    </script>
  </body>
</html>
