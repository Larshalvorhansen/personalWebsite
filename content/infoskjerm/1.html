<!doctype html>
<html>
  <head>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #000; /* Keeps the 'weird screen' vibe clean */
        overflow: hidden;
      }

      img {
        /* Rotate -90 degrees (Counter-Clockwise) */
        transform: rotate(-90deg);

        /* Maximize size while keeping aspect ratio */
        max-width: 100vh;
        max-height: 100vw;
        object-fit: contain;
      }
    </style>
  </head>
  <body>
    <img src="test.png" alt="Rotated Artwork" />
  </body>
</html>
