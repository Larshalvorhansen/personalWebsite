<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stue-skjerm – Vertikal</title>
    <style>
      /* 1. RESET & LOCK VIEWPORT */
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        background: #000;
        color: #eee;
        overflow: hidden;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      /* 2. THE ROTATION MAGIC */
      /* We move the 'top' to the bottom of the screen, then rotate it UP into view */
      body {
        position: absolute;
        top: 100%;
        left: 0;
        width: 100vh; /* Content width = Screen height */
        height: 100vw; /* Content height = Screen width */
        transform: rotate(-90deg);
        transform-origin: top left;
      }

      .main-content {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
      }

      /* 3. THE PAINTING (Top Section) */
      .painting-container {
        width: 100%;
        height: 38%; /* Adjust this to make image larger/smaller */
        flex-shrink: 0;
        background: #111;
        overflow: hidden;
      }

      .painting-container img {
        width: 100%;
        height: 100%;
        object-fit: cover; /* Fills the area completely */
        display: block;
      }

      /* 4. CLOCK & TEXT STYLES */
      .clock-container {
        width: 280px;
        height: 280px;
        margin-top: 15px;
        position: relative;
      }

      .analog-clock {
        width: 100%;
        height: 100%;
      }

      .digital-time {
        font-size: 3.2rem;
        font-weight: 300;
        letter-spacing: 4px;
        color: #aaffff;
        text-shadow: 0 0 15px #00aaff88;
        margin-top: -10px;
        margin-bottom: 10px;
      }

      .quote-section {
        width: 90%;
        text-align: center;
        margin-bottom: 15px;
      }

      #quote {
        font-size: 1.5rem;
        font-style: italic;
        color: #ccc;
        line-height: 1.4;
      }

      .transit-section {
        width: 90%;
        max-width: 800px;
      }

      h2 {
        font-size: 1.4rem;
        color: #88ddff;
        margin: 10px 0 5px 0;
        font-weight: 400;
        border-bottom: 1px solid #333;
      }

      .bus {
        display: flex;
        font-size: 1.5rem;
        padding: 6px 0;
        align-items: center;
      }

      .line {
        font-weight: bold;
        color: #88ddff;
        min-width: 50px;
      }
      .dest {
        flex: 1;
        color: #ddd;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .time {
        color: #ffdd88;
        min-width: 100px;
        text-align: right;
        font-weight: 500;
      }
      .special {
        color: #ff7777;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="main-content">
      <div class="painting-container">
        <img src="IMG_4052.png" alt="Artwork" />
      </div>

      <div class="clock-container">
        <svg class="analog-clock" viewBox="0 0 200 200">
          <circle
            cx="100"
            cy="100"
            r="98"
            fill="none"
            stroke="#222"
            stroke-width="3"
          />
          <g id="hands">
            <line
              id="hour"
              x1="100"
              y1="100"
              x2="100"
              y2="60"
              stroke="#fff"
              stroke-width="6"
              stroke-linecap="round"
            />
            <line
              id="minute"
              x1="100"
              y1="100"
              x2="100"
              y2="35"
              stroke="#fff"
              stroke-width="4"
              stroke-linecap="round"
            />
            <line
              id="second"
              x1="100"
              y1="100"
              x2="100"
              y2="25"
              stroke="#ff5555"
              stroke-width="2"
              stroke-linecap="round"
            />
          </g>
          <circle cx="100" cy="100" r="3" fill="#88ddff" />
        </svg>
      </div>

      <div class="digital-time" id="digital">00:00:00</div>

      <div class="quote-section">
        <div id="quote">Bedre med en iskaffe i hånden enn ti bak disken.</div>
      </div>

      <div class="transit-section">
        <h2>Jakob kirke & Nybrua</h2>
        <div id="departures"></div>
      </div>
    </div>

    <script>
      // --- CLOCK LOGIC ---
      function updateClock() {
        const now = new Date();
        const h = now.getHours(),
          m = now.getMinutes(),
          s = now.getSeconds();

        document
          .getElementById("hour")
          .setAttribute(
            "transform",
            `rotate(${(h % 12) * 30 + m * 0.5} 100 100)`,
          );
        document
          .getElementById("minute")
          .setAttribute("transform", `rotate(${m * 6 + s * 0.1} 100 100)`);
        document
          .getElementById("second")
          .setAttribute("transform", `rotate(${s * 6} 100 100)`);

        document.getElementById("digital").textContent = now.toLocaleTimeString(
          "no-NO",
          {
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
          },
        );
      }
      setInterval(updateClock, 1000);
      updateClock();

      // --- TRANSIT LOGIC ---
      const API_URL = "https://api.entur.io/journey-planner/v3/graphql";
      const STOPS = ["NSR:StopPlace:6435", "NSR:StopPlace:61989"]; // Jakob & Nybrua

      async function fetchAllTransit() {
        const container = document.getElementById("departures");
        let combinedHtml = "";

        for (const stopId of STOPS) {
          try {
            const query = `{ stopPlace(id: "${stopId}") { estimatedCalls(numberOfDepartures: 4, timeRange: 3600) { expectedDepartureTime destinationDisplay { frontText } serviceJourney { journeyPattern { line { publicCode } } } } } }`;
            const res = await fetch(API_URL, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "ET-Client-Name": "stue-skjerm-v2",
              },
              body: JSON.stringify({ query }),
            });
            const data = await res.json();
            const calls = data.data.stopPlace.estimatedCalls;

            calls.forEach((call) => {
              const time = new Date(call.expectedDepartureTime);
              const diffMin = Math.round((time - new Date()) / 60000);
              let timestr =
                diffMin <= 0
                  ? "nå"
                  : diffMin < 60
                    ? `${diffMin} min`
                    : time.toLocaleTimeString("no-NO", {
                        hour: "2-digit",
                        minute: "2-digit",
                      });
              const isSpecial = diffMin === 2;

              combinedHtml += `
                            <div class="bus">
                                <span class="line">${call.serviceJourney.journeyPattern.line.publicCode}</span>
                                <span class="dest">${call.destinationDisplay.frontText}</span>
                                <span class="time ${isSpecial ? "special" : ""}">${isSpecial ? "LØP! " + timestr : timestr}</span>
                            </div>`;
            });
          } catch (e) {
            console.error(e);
          }
        }
        container.innerHTML = combinedHtml || "Ingen avganger nå.";
      }

      fetchAllTransit();
      setInterval(fetchAllTransit, 30000); // Update every 30s
    </script>
  </body>
</html>
