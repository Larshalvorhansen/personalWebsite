<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Full Screen Rotated Test Pattern</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: black;
        overflow: hidden;
      }

      img {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) rotate(0deg);
        width: 100vw;
        height: 100vh;
        object-fit: cover; /* This forces it to fill the screen */
        object-position: center;
      }
    </style>
  </head>
  <body>
    <img src="test-pattern.png" alt="Test Pattern" />
  </body>
</html>
