<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stue-skjerm – Vertikal</title>
    <style>
      /* 1. LOCK THE VIEWPORT */
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        background: #000;
        color: #eee;
        overflow: hidden;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      /* 2. PIXEL-PERFECT ROTATION */
      /* We set the width/height to exactly match the physical screen flip */
      body {
        position: absolute;
        width: 100vh; /* The 'height' of your dashboard is the screen width */
        height: 100vw; /* The 'width' of your dashboard is the screen height */

        /* Anchor to bottom-left and rotate -90deg back into view */
        left: 0;
        top: 100vh;
        transform: rotate(-90deg);
        transform-origin: 0 0;
      }

      .main-content {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start; /* Start from the very top */
        padding: 0;
        margin: 0;
      }

      /* 3. THE PAINTING (Zero-gap top) */
      .painting-container {
        width: 100%;
        height: 40%; /* Increase this to 50% if you want the painting bigger */
        flex-shrink: 0;
        background: #000;
      }

      .painting-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      /* 4. DASHBOARD ELEMENTS */
      .clock-container {
        width: 320px;
        height: 320px;
        margin-top: 20px;
      }

      .analog-clock {
        width: 100%;
        height: 100%;
      }

      .digital-time {
        font-size: 3.5rem;
        color: #aaffff;
        text-shadow: 0 0 15px #00aaff88;
        margin-top: -10px;
      }

      .quote-section {
        width: 90%;
        text-align: center;
        margin: 15px 0;
      }

      #quote {
        font-size: 1.6rem;
        font-style: italic;
        color: #ccc;
      }

      .transit-section {
        width: 92%;
      }
      h2 {
        font-size: 1.6rem;
        color: #88ddff;
        margin: 10px 0;
      }

      .bus {
        display: flex;
        font-size: 1.6rem;
        padding: 8px 0;
        border-bottom: 1px solid #222;
      }
      .line {
        font-weight: bold;
        color: #88ddff;
        width: 60px;
      }
      .dest {
        flex: 1;
        color: #ddd;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .time {
        color: #ffdd88;
        width: 110px;
        text-align: right;
      }
    </style>
  </head>
  <body>
    <div class="main-content">
      <div class="painting-container">
        <img src="IMG_4052.png" alt="Painting" />
      </div>

      <div class="clock-container">
        <svg class="analog-clock" viewBox="0 0 200 200">
          <circle
            cx="100"
            cy="100"
            r="98"
            fill="none"
            stroke="#333"
            stroke-width="2"
          />
          <g id="hands">
            <line
              id="hour"
              x1="100"
              y1="100"
              x2="100"
              y2="60"
              stroke="#fff"
              stroke-width="6"
              stroke-linecap="round"
            />
            <line
              id="minute"
              x1="100"
              y1="100"
              x2="100"
              y2="35"
              stroke="#fff"
              stroke-width="4"
              stroke-linecap="round"
            />
            <line
              id="second"
              x1="100"
              y1="100"
              x2="100"
              y2="25"
              stroke="#ff5555"
              stroke-width="2"
            />
          </g>
        </svg>
      </div>

      <div class="digital-time" id="digital">00:00:00</div>

      <div class="quote-section">
        <div id="quote">Bedre med en iskaffe i hånden enn ti bak disken.</div>
      </div>

      <div class="transit-section">
        <div id="departures"></div>
      </div>
    </div>

    <script>
      function updateClock() {
        const now = new Date();
        const h = now.getHours(),
          m = now.getMinutes(),
          s = now.getSeconds();
        document
          .getElementById("hour")
          .setAttribute(
            "transform",
            `rotate(${(h % 12) * 30 + m * 0.5} 100 100)`,
          );
        document
          .getElementById("minute")
          .setAttribute("transform", `rotate(${m * 6 + s * 0.1} 100 100)`);
        document
          .getElementById("second")
          .setAttribute("transform", `rotate(${s * 6} 100 100)`);
        document.getElementById("digital").textContent = now.toLocaleTimeString(
          "no-NO",
          { hour: "2-digit", minute: "2-digit", second: "2-digit" },
        );
      }
      setInterval(updateClock, 1000);
      updateClock();

      const API_URL = "https://api.entur.io/journey-planner/v3/graphql";
      const STOPS = ["NSR:StopPlace:6435", "NSR:StopPlace:61989"];

      async function fetchAllTransit() {
        const container = document.getElementById("departures");
        let combinedHtml = "";
        for (const stopId of STOPS) {
          try {
            const query = `{ stopPlace(id: "${stopId}") { estimatedCalls(numberOfDepartures: 3, timeRange: 3600) { expectedDepartureTime destinationDisplay { frontText } serviceJourney { journeyPattern { line { publicCode } } } } } }`;
            const res = await fetch(API_URL, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "ET-Client-Name": "stue-skjerm",
              },
              body: JSON.stringify({ query }),
            });
            const data = await res.json();
            const calls = data.data.stopPlace.estimatedCalls;
            calls.forEach((call) => {
              const time = new Date(call.expectedDepartureTime);
              const diffMin = Math.round((time - new Date()) / 60000);
              let timestr =
                diffMin <= 0
                  ? "nå"
                  : diffMin < 60
                    ? `${diffMin} min`
                    : time.toLocaleTimeString("no-NO", {
                        hour: "2-digit",
                        minute: "2-digit",
                      });
              combinedHtml += `<div class="bus"><span class="line">${call.serviceJourney.journeyPattern.line.publicCode}</span><span class="dest">${call.destinationDisplay.frontText}</span><span class="time">${timestr}</span></div>`;
            });
          } catch (e) {
            console.log(e);
          }
        }
        container.innerHTML = combinedHtml || "Ingen avganger";
      }
      fetchAllTransit();
      setInterval(fetchAllTransit, 30000);
    </script>
  </body>
</html>
