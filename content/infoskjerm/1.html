<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Centered Rotated Test Pattern</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        background: black;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .rotated {
        transform: rotate(-180deg);
        max-width: 100vh; /* Important for rotation */
        max-height: 100vw;
        width: auto;
        height: auto;
      }
    </style>
  </head>
  <body>
    <img src="test.png" class="rotated" alt="Test Pattern" />
  </body>
</html>
