<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        margin: 0;
        background: #020617;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .clock-container {
        position: relative;
        width: 620px;
        height: 620px;
        max-width: 95vw;
        max-height: 95vw;
        border-radius: 9999px;
        overflow: hidden;
        background: #020617;
        cursor: grab;
      }

      .clock-container:active {
        cursor: grabbing;
      }

      .layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        user-select: none;
        -webkit-user-drag: none;
      }

      .middle {
        will-change: transform;
        z-index: 20;
      }

      .front {
        width: 100%;
        height: 100%;
        border-radius: 9999px;
        z-index: 30;
      }
    </style>
  </head>
  <body>
    <div id="clockContainer" class="clock-container">
      <img src="wtCities.png" class="layer" style="z-index: 10" alt="" />

      <img src="wtHours.png" id="hoursDial" class="layer middle" alt="" />

      <img src="wtEarth.png" class="layer front" alt="" />
    </div>

    <script>
      // CONFIGURATION: Set your static 24-hour time here (e.g., 14 = 14:00, 14.5 = 14:30)
      const TARGET_TIME = 3.5;

      const clockContainer = document.getElementById("clockContainer");
      const hoursDial = document.getElementById("hoursDial");

      let isDragging = false;
      let currentRotation = 0;
      let dragStartRotation = 0;
      let dragStartMouseAngle = 0;

      function hoursToAngle(totalHours) {
        return -((totalHours % 24) / 24) * 360;
      }

      function getAngleFromCenter(clientX, clientY) {
        const rect = clockContainer.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        return (
          Math.atan2(clientY - centerY, clientX - centerX) * (180 / Math.PI)
        );
      }

      // Initialize the dial to the fixed set time
      function initializeFixedTime() {
        currentRotation = hoursToAngle(TARGET_TIME);
        hoursDial.style.transform = `rotate(${currentRotation}deg)`;
      }

      // Mouse Events for manual overriding via drag
      clockContainer.addEventListener("mousedown", (e) => {
        if (e.button !== 0) return;
        isDragging = true;
        dragStartRotation = currentRotation;
        dragStartMouseAngle = getAngleFromCenter(e.clientX, e.clientY);
        document.body.style.userSelect = "none";
      });

      document.addEventListener("mousemove", (e) => {
        if (!isDragging) return;
        let deltaAngle =
          getAngleFromCenter(e.clientX, e.clientY) - dragStartMouseAngle;
        if (deltaAngle > 180) deltaAngle -= 360;
        if (deltaAngle < -180) deltaAngle += 360;
        currentRotation = dragStartRotation + deltaAngle;
        hoursDial.style.transform = `rotate(${currentRotation}deg)`;
      });

      document.addEventListener("mouseup", () => {
        if (isDragging) {
          isDragging = false;
          document.body.style.userSelect = "";
        }
      });

      // Touch Events
      clockContainer.addEventListener(
        "touchstart",
        (e) => {
          isDragging = true;
          const touch = e.touches[0];
          dragStartRotation = currentRotation;
          dragStartMouseAngle = getAngleFromCenter(
            touch.clientX,
            touch.clientY,
          );
          e.preventDefault();
        },
        { passive: false },
      );

      document.addEventListener(
        "touchmove",
        (e) => {
          if (!isDragging) return;
          const touch = e.touches[0];
          let deltaAngle =
            getAngleFromCenter(touch.clientX, touch.clientY) -
            dragStartMouseAngle;
          if (deltaAngle > 180) deltaAngle -= 360;
          if (deltaAngle < -180) deltaAngle += 360;
          currentRotation = dragStartRotation + deltaAngle;
          hoursDial.style.transform = `rotate(${currentRotation}deg)`;
          e.preventDefault();
        },
        { passive: false },
      );

      document.addEventListener("touchend", () => {
        isDragging = false;
      });

      // Run on load
      initializeFixedTime();
    </script>
  </body>
</html>
