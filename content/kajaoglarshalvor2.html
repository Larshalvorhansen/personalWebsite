<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vi gifter oss 24. juli 2027</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: #0f0f0f;
        color: white;
        font-family: Arial, sans-serif;
        overflow: hidden;
      }

      .flip-card {
        perspective: 1000px;
        width: 90vw;
        height: 80vh; /* Leaves room for the text text below */
        cursor: pointer;
      }

      .flip-card-inner {
        position: relative;
        width: 100%;
        height: 100%;
        transition: transform 0.6s;
        transform-style: preserve-3d;
      }

      .flip-card.flipped .flip-card-inner {
        transform: rotateY(180deg);
      }

      .flip-card-front,
      .flip-card-back {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
      }

      .flip-card-back {
        transform: rotateY(180deg);
      }

      img {
        width: 100%;
        height: 100%;
        /* 'contain' keeps the original image ratio without cropping it */
        object-fit: contain;
        filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.6));
      }

      .info {
        margin-top: 20px;
        font-size: 1.1em;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="flip-card" id="flipCard">
      <div class="flip-card-inner">
        <div class="flip-card-front">
          <img src="std5f.jpg" alt="Vi gifter oss 24.juli 2027!" />
        </div>

        <div class="flip-card-back">
          <img src="std5b.jpg" alt="Hurra" />
        </div>
      </div>
    </div>

    <p class="info">Klikk på bildet for å snu det</p>

    <script>
      const flipCard = document.getElementById("flipCard");
      flipCard.addEventListener("click", () => {
        flipCard.classList.toggle("flipped");
      });
    </script>
  </body>
</html>
