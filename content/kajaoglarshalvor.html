<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--<title>Super Simple Centered Image</title>-->
    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #0f0f0f;
        font-family: Arial, sans-serif;
      }

      .container {
        text-align: center;
      }

      img {
        max-width: 80%;
        max-height: 80vh;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      h1 {
        color: white;
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img
        src="denne315.jpg"
        alt="Vi gifter oss 24.juli 2027! På Risøya. Mer info kommer etterhvert"
      />
      Mer info kommer på denne netsiden etterhvert
    </div>
  </body>
</html>
