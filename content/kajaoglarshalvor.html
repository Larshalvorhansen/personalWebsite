<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vi gifter oss 24. juli 2027</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #0f0f0f;
        font-family: Arial, sans-serif;
      }

      .container {
        text-align: center;
      }

      /* Flip Card */
      .flip-card {
        perspective: 1000px;
        width: 80%;
        max-width: 900px;
        margin: 0 auto;
      }

      .flip-card-inner {
        position: relative;
        width: 100%;
        padding-top: 66.67%; /* 3:2 aspect ratio */
        transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        transform-style: preserve-3d;
        cursor: pointer;
      }

      .flip-card.flipped .flip-card-inner {
        transform: rotateY(180deg);
      }

      .flip-card-front,
      .flip-card-back {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        backface-visibility: hidden;
        overflow: hidden;
      }

      .flip-card-front {
        background: #000;
      }

      .flip-card-back {
        transform: rotateY(180deg);
        background: #000;
      }

      img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .info {
        color: white;
        margin-top: 25px;
        font-size: 1.1em;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="flip-card" id="flipCard">
        <div class="flip-card-inner">
          <!-- Front Image -->
          <div class="flip-card-front">
            <img src="denne315.jpg" alt="Vi gifter oss 24.juli 2027!" />
          </div>

          <!-- Back Image -->
          <div class="flip-card-back">
            <img src="denne314.jpg" alt="Vi gifter oss 24.juli 2027!" />
          </div>
        </div>
      </div>

      <p class="info">
        Klikk på bildet for å snu det • Mer info kommer etterhvert
      </p>
    </div>

    <script>
      const flipCard = document.getElementById("flipCard");

      flipCard.addEventListener("click", () => {
        flipCard.classList.toggle("flipped");
      });
    </script>
  </body>
</html>
